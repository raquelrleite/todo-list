<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
</head>
<body style="margin:0; padding:0; background:#f4f4f4; font-family: Arial, sans-serif;">

<table width="100%" cellpadding="0" cellspacing="0">
    <tr>
        <td align="center" style="padding: 40px 20px;">
            <table width="500" cellpadding="0" cellspacing="0" style="background:#ffffff; border-radius:8px; overflow:hidden;">

                <!-- Header -->
                <tr>
                    <td style="background:#8B6EE8; padding: 28px 32px;">
                        <h1 style="margin:0; color:#ffffff; font-size:24px; letter-spacing:-0.5px;">taskflow.</h1>
                    </td>
                </tr>

                <!-- Body -->
                <tr>
                    <td style="padding: 32px;">
                        <p style="margin:0 0 16px; color:#1E1830; font-size:15px;">Hi <strong th:text="${name}">User</strong>,</p>
                        <p style="margin:0 0 24px; color:#555; font-size:14px; line-height:1.6;">
                            Welcome to taskflow! Please confirm your email address to activate your account.
                        </p>

                        <a th:href="${confirmUrl}"
                           style="display:inline-block; padding:12px 28px; background:#8B6EE8; color:#ffffff;
                      border-radius:8px; text-decoration:none; font-size:14px; font-weight:bold;">
                            Confirm my account
                        </a>

                        <p style="margin:28px 0 0; color:#999; font-size:12px; line-height:1.6;">
                            This link expires in <span th:text="${expirationHours}">24</span> hour(s).<br>
                            If you didn't create an account on taskflow, you can safely ignore this email.
                        </p>
                    </td>
                </tr>

                <!-- Footer -->
                <tr>
                    <td style="padding: 20px 32px; border-top: 1px solid #f0f0f0;">
                        <p style="margin:0; color:#bbb; font-size:11px;">© 2025 taskflow. All rights reserved.</p>
                    </td>
                </tr>

            </table>
        </td>
    </tr>
</table>

</body>
</html>
